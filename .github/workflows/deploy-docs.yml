name: Deploy docs to gh-pages

on:
  push:
    branches: [ main ]

# Grant explicit permissions required for pushing to gh-pages and Pages API
permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Deploy docs directory to gh-pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
          publish_branch: gh-pages
          commit_message: "docs: deploy docs to gh-pages [skip ci]"