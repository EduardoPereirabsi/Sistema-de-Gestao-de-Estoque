spring:
  profiles:
    active: dev

  datasource:
    url: jdbc:mysql://localhost:3306/gestao_estoque?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=America/Sao_Paulo
    username: ${DB_USERNAME:gestao_user}
    password: ${DB_PASSWORD:gestao_pass}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: false

server:
  port: 8080

app:
  jwt:
    secret: ${JWT_SECRET:chave-secreta-padrao-dev-256-bits-segura-abc123!!}
    access-token-expiration: 900000
    refresh-token-expiration: 604800000

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
